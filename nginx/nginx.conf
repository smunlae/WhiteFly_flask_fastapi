upstream flask_backend {
    server $FLASK_WEB_HOST:8000;
}

upstream fastapi_backend {
    server $FASTAPI_WEB_HOST:8000;
}

server {
    listen 80;
    server_name _;

    # Redirect /flask to /flask/
    location = /flask {
        return 301 /flask/;
    }

    # Redirect /fastapi to /fastapi/
    location = /fastapi {
        return 301 /fastapi/;
    }

    # Flask proxy with path stripping
    location /flask/ {
        proxy_pass http://flask_backend/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $server_name;
        proxy_set_header X-Forwarded-Prefix /flask;
    }

    # FastAPI proxy with path stripping
    location /fastapi/ {
        proxy_pass http://fastapi_backend/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $server_name;
        proxy_set_header X-Forwarded-Prefix /fastapi;
    }
}
