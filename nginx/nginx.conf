worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    sendfile on;
    keepalive_timeout 65;

    limit_req_zone $binary_remote_addr zone=req_limit:10m rate=20r/m;

    upstream flask_upstream {
        server flask_web:5000;
    }

    upstream fastapi_upstream {
        server fastapi_web:8000;
    }

    server {
        listen 80;

        location = / {
            return 302 /flask/;
        }

        location = /flask {
            return 301 /flask/;
        }

        location /flask/ {
            limit_req zone=req_limit burst=20 nodelay;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Prefix /flask;
            proxy_http_version 1.1;
            proxy_pass http://flask_upstream/;
        }

        location = /fastapi {
            return 301 /fastapi/;
        }

        location /fastapi/ {
            limit_req zone=req_limit burst=20 nodelay;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Prefix /fastapi;
            proxy_http_version 1.1;
            proxy_pass http://fastapi_upstream/;
        }
    }
}
